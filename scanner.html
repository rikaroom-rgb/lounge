<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>貴賓室核銷系統</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- ZXing QR Code Scanner -->
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #0a0f0a;
      --surface: #0f1a0f;
      --green:   #00ff7f;
      --red:     #ff3b3b;
      --amber:   #ffbb33;
      --text:    #c8e6c9;
      --muted:   #4a6b4a;
      --border:  rgba(0,255,127,0.15);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans TC', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: var(--surface);
    }

    .header-icon { font-size: 1.4rem; }

    .header-text h1 {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.85rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      color: var(--green);
    }

    .header-text p {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
      margin-top: 2px;
    }

    .status-indicator {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.65rem;
      color: var(--muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: blink 1.5s infinite;
    }

    @keyframes blink { 50% { opacity: 0.3; } }

    /* ── Main ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 1.25rem;
      gap: 1.25rem;
      max-width: 480px;
      width: 100%;
      margin: 0 auto;
    }

    /* ── Scanner Box ── */
    .scanner-section { }

    .scanner-label {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 0.6rem;
    }

    .video-wrapper {
      position: relative;
      width: 100%;
      aspect-ratio: 1 / 1;
      background: #000;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
    }

    #preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .scan-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    .scan-frame {
      width: 55%;
      aspect-ratio: 1;
      border: 2px solid var(--green);
      box-shadow: 0 0 0 9999px rgba(0,0,0,0.45), inset 0 0 20px rgba(0,255,127,0.08);
      border-radius: 4px;
    }

    .scan-line {
      position: absolute;
      width: 55%;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      animation: scanline 2s ease-in-out infinite;
    }

    @keyframes scanline {
      0%   { top: 22.5%; opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 1; }
      100% { top: 77.5%; opacity: 0; }
    }

    .scanner-off-msg {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      background: #000;
    }

    .scanner-off-msg p {
      font-size: 0.75rem;
      color: var(--muted);
      text-align: center;
    }

    /* ── Buttons ── */
    .btn {
      width: 100%;
      padding: 0.85rem;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.1em;
      font-weight: 600;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-start {
      background: rgba(0,255,127,0.1);
      border: 1px solid rgba(0,255,127,0.4);
      color: var(--green);
      margin-top: 0.75rem;
    }

    .btn-start:hover { background: rgba(0,255,127,0.18); }

    .btn-confirm {
      background: var(--green);
      color: #0a0f0a;
      font-size: 0.9rem;
    }

    .btn-confirm:hover { background: #00e070; }
    .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-reset {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      margin-top: 0.5rem;
    }

    .btn-reset:hover { border-color: rgba(0,255,127,0.3); color: var(--text); }

    /* ── Manual Input ── */
    .manual-section {
      display: flex;
      gap: 0.5rem;
    }

    .manual-input {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.7rem 0.9rem;
      color: var(--text);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      outline: none;
      transition: border-color 0.15s;
    }

    .manual-input:focus { border-color: rgba(0,255,127,0.5); }
    .manual-input::placeholder { color: var(--muted); }

    .btn-manual {
      padding: 0.7rem 1rem;
      width: auto;
      background: rgba(0,255,127,0.08);
      border: 1px solid var(--border);
      color: var(--green);
      border-radius: 3px;
      cursor: pointer;
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.05em;
      transition: all 0.15s;
    }

    .btn-manual:hover { background: rgba(0,255,127,0.15); }

    /* ── Result Card ── */
    .result-card {
      border-radius: 4px;
      overflow: hidden;
      animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both;
      display: none;
    }

    .result-card.show { display: block; }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .result-header {
      padding: 1.2rem 1.25rem 1rem;
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .result-icon {
      font-size: 2.5rem;
      line-height: 1;
    }

    .result-header-text h2 {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .result-header-text p {
      font-size: 0.7rem;
      margin-top: 2px;
      opacity: 0.6;
      font-family: 'IBM Plex Mono', monospace;
    }

    .result-card.valid .result-header {
      background: rgba(0,255,127,0.08);
      border-bottom: 1px solid rgba(0,255,127,0.2);
    }

    .result-card.valid .result-header-text h2 { color: var(--green); }

    .result-card.invalid .result-header {
      background: rgba(255,59,59,0.08);
      border-bottom: 1px solid rgba(255,59,59,0.2);
    }

    .result-card.invalid .result-header-text h2 { color: var(--red); }

    .result-body {
      padding: 1.1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
    }

    .result-field {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 0.45rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .result-field:last-child { border-bottom: none; }

    .result-field-key {
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-family: 'IBM Plex Mono', monospace;
    }

    .result-field-val {
      font-size: 0.9rem;
      color: var(--text);
      text-align: right;
      max-width: 65%;
      word-break: break-all;
    }

    .result-actions {
      padding: 1rem 1.25rem;
      background: var(--surface);
      border: 1px solid var(--border);
      border-top: none;
    }

    /* ── Loading ── */
    .loading {
      display: none;
      text-align: center;
      padding: 1.5rem;
      gap: 0.5rem;
      flex-direction: column;
      align-items: center;
    }

    .loading.show { display: flex; }

    .spinner {
      width: 28px; height: 28px;
      border: 2px solid var(--border);
      border-top-color: var(--green);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .loading p {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    /* ── Toast ── */
    .toast {
      position: fixed;
      bottom: 1.5rem;
      left: 50%;
      transform: translateX(-50%) translateY(100px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0.7rem 1.2rem;
      font-size: 0.8rem;
      font-family: 'IBM Plex Mono', monospace;
      color: var(--green);
      letter-spacing: 0.05em;
      transition: transform 0.35s cubic-bezier(0.16,1,0.3,1);
      z-index: 100;
      white-space: nowrap;
    }

    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="header-icon">✈</div>
  <div class="header-text">
    <h1>LOUNGE · REDEMPTION</h1>
    <p>Airport Lounge Access · Staff Terminal</p>
  </div>
  <div class="status-indicator">
    <div class="status-dot"></div>
    <span>ONLINE</span>
  </div>
</header>

<main>
  <!-- QR Scanner -->
  <div class="scanner-section">
    <div class="scanner-label">📷 QR Code 掃描器</div>
    <div class="video-wrapper">
      <video id="preview" playsinline></video>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
      <div class="scanner-off-msg" id="scannerOffMsg">
        <span style="font-size:2rem">📷</span>
        <p>按下「啟動相機」開始掃描</p>
      </div>
    </div>
    <button class="btn btn-start" id="btnStartScan">▶ 啟動相機掃描</button>
  </div>

  <!-- Manual Input -->
  <div>
    <div class="scanner-label">⌨️ 手動輸入票券編號</div>
    <div class="manual-section">
      <input type="text" class="manual-input" id="manualInput" placeholder="PASS-001">
      <button class="btn-manual" id="btnManual">查詢</button>
    </div>
  </div>

  <!-- Loading -->
  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>查詢資料庫中...</p>
  </div>

  <!-- Result Card -->
  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-header-text">
        <h2 id="resultTitle"></h2>
        <p id="resultSubtitle"></p>
      </div>
    </div>
    <div class="result-body" id="resultBody"></div>
    <div class="result-actions" id="resultActions"></div>
  </div>
</main>

<div class="toast" id="toast"></div>

<script>
  // ── 設定：請填入你的 Google Apps Script Web App URL ──
  const API_URL = "https://script.google.com/macros/s/AKfycbwoCsWPb1sv_Vuan2vaHlKfuYZ84MOEd_oVyNAQTrWdcVciZyXzqWW-9dRnEwJsStL5sw/exec";
  // ────────────────────────────────────────────────────

  let codeReader = null;
  let scanning = false;
  let lastScanned = "";
  let lastScannedTime = 0;

  const $ = id => document.getElementById(id);

  // ── 啟動掃描器 ──────────────────────────────────────
  $("btnStartScan").addEventListener("click", async () => {
    if (scanning) {
      stopScanner();
      return;
    }
    try {
      codeReader = new ZXing.BrowserQRCodeReader();
      const devices = await ZXing.BrowserQRCodeReader.listVideoInputDevices();
      const deviceId = devices.length > 1 ? devices[1].deviceId : devices[0]?.deviceId;

      $("scannerOffMsg").style.display = "none";
      $("btnStartScan").textContent = "⏹ 停止掃描";
      scanning = true;

      codeReader.decodeFromVideoDevice(deviceId, "preview", (result, err) => {
        if (result) {
          const text = result.getText();
          const now = Date.now();
          // 防重複觸發（同一張碼 3 秒內只查一次）
          if (text === lastScanned && now - lastScannedTime < 3000) return;
          lastScanned = text;
          lastScannedTime = now;

          // 從 URL 中提取 id 參數，或直接當 passId
          let passId = text;
          try {
            const url = new URL(text);
            passId = url.searchParams.get("id") || text;
          } catch {}

          stopScanner();
          verifyPass(passId);
        }
      });
    } catch (e) {
      alert("無法啟動相機：" + e.message);
    }
  });

  function stopScanner() {
    if (codeReader) {
      codeReader.reset();
      codeReader = null;
    }
    scanning = false;
    $("btnStartScan").textContent = "▶ 啟動相機掃描";
    $("scannerOffMsg").style.display = "flex";
  }

  // ── 手動輸入 ────────────────────────────────────────
  $("btnManual").addEventListener("click", () => {
    const id = $("manualInput").value.trim();
    if (!id) return;
    verifyPass(id);
  });

  $("manualInput").addEventListener("keydown", e => {
    if (e.key === "Enter") $("btnManual").click();
  });

  // ── 查詢票券 ────────────────────────────────────────
  async function verifyPass(passId) {
    showLoading(true);
    clearResult();

    try {
      const res = await fetch(`${API_URL}?action=verify&id=${encodeURIComponent(passId)}`);
      const data = await res.json();
      showResult(data, passId);
    } catch (e) {
      showError("網路連線失敗，請檢查網路狀態");
    } finally {
      showLoading(false);
    }
  }

  // ── 執行核銷 ────────────────────────────────────────
  async function redeemPass(passId) {
    const btn = $("btnConfirmRedeem");
    btn.disabled = true;
    btn.textContent = "核銷中...";

    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "redeem", id: passId })
      });
      const data = await res.json();

      if (data.success) {
        showToast("✅ 核銷成功！");
        // 更新顯示
        setTimeout(() => verifyPass(passId), 500);
      } else {
        showToast("❌ " + (data.error || "核銷失敗"));
        btn.disabled = false;
        btn.textContent = "✓ 確認核銷";
      }
    } catch (e) {
      showToast("❌ 網路錯誤");
      btn.disabled = false;
      btn.textContent = "✓ 確認核銷";
    }
  }

  // ── UI 顯示函式 ──────────────────────────────────────
  function showResult(data, passId) {
    const card = $("resultCard");
    const icon = $("resultIcon");
    const title = $("resultTitle");
    const subtitle = $("resultSubtitle");
    const body = $("resultBody");
    const actions = $("resultActions");

    card.className = "result-card show";

    if (data.valid) {
      card.classList.add("valid");
      icon.textContent = "🟢";
      title.textContent = "票券有效";
      subtitle.textContent = "PASS · VALID";

      body.innerHTML = `
        <div class="result-field">
          <span class="result-field-key">旅客姓名</span>
          <span class="result-field-val">${data.guestName}</span>
        </div>
        <div class="result-field">
          <span class="result-field-key">合作廠商</span>
          <span class="result-field-val">${data.partnerName}</span>
        </div>
        <div class="result-field">
          <span class="result-field-key">票券編號</span>
          <span class="result-field-val">${data.passId}</span>
        </div>
        <div class="result-field">
          <span class="result-field-key">狀態</span>
          <span class="result-field-val" style="color:var(--green)">● 待核銷</span>
        </div>
      `;

      actions.innerHTML = `
        <button class="btn btn-confirm" id="btnConfirmRedeem" onclick="redeemPass('${data.passId}')">
          ✓ 確認核銷
        </button>
        <button class="btn btn-reset" onclick="resetUI()">取消</button>
      `;
    } else {
      card.classList.add("invalid");
      icon.textContent = "🔴";
      title.textContent = data.reason || "票券無效";
      subtitle.textContent = "PASS · REJECTED";

      let fieldsHtml = `
        <div class="result-field">
          <span class="result-field-key">票券編號</span>
          <span class="result-field-val">${passId}</span>
        </div>
      `;

      if (data.guestName) {
        fieldsHtml += `
          <div class="result-field">
            <span class="result-field-key">旅客姓名</span>
            <span class="result-field-val">${data.guestName}</span>
          </div>
          <div class="result-field">
            <span class="result-field-key">合作廠商</span>
            <span class="result-field-val">${data.partnerName}</span>
          </div>
          <div class="result-field">
            <span class="result-field-key">核銷時間</span>
            <span class="result-field-val" style="color:var(--red)">${data.redeemedAt}</span>
          </div>
        `;
      }

      body.innerHTML = fieldsHtml;
      actions.innerHTML = `<button class="btn btn-reset" onclick="resetUI()">↩ 重新掃描</button>`;
    }
  }

  function showError(msg) {
    const card = $("resultCard");
    card.className = "result-card show invalid";
    $("resultIcon").textContent = "⚠️";
    $("resultTitle").textContent = "系統錯誤";
    $("resultSubtitle").textContent = "ERROR";
    $("resultBody").innerHTML = `<p style="color:var(--red);font-size:0.85rem;padding:0.5rem 0">${msg}</p>`;
    $("resultActions").innerHTML = `<button class="btn btn-reset" onclick="resetUI()">↩ 重試</button>`;
  }

  function clearResult() {
    $("resultCard").className = "result-card";
  }

  function resetUI() {
    clearResult();
    $("manualInput").value = "";
  }

  function showLoading(show) {
    $("loading").className = show ? "loading show" : "loading";
  }

  function showToast(msg) {
    const t = $("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }
</script>
</body>
</html>

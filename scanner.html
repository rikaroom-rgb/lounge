<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>貴賓室核銷系統</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;600&family=Noto+Sans+TC:wght@300;400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0a0f0a; --surface: #0f1a0f; --green: #00ff7f;
      --red: #ff3b3b; --text: #c8e6c9; --muted: #4a6b4a;
      --border: rgba(0,255,127,0.15);
    }
    body { background: var(--bg); color: var(--text); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    header { padding: 1rem 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 0.75rem; background: var(--surface); }
    .header-icon { font-size: 1.4rem; }
    .header-text h1 { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; font-weight: 600; letter-spacing: 0.1em; color: var(--green); }
    .header-text p { font-size: 0.65rem; color: var(--muted); margin-top: 2px; }
    .status-dot-wrap { margin-left: auto; display: flex; align-items: center; gap: 0.4rem; font-size: 0.65rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); box-shadow: 0 0 6px var(--green); animation: blink 1.5s infinite; }
    @keyframes blink { 50% { opacity: 0.3; } }

    main { flex: 1; display: flex; flex-direction: column; padding: 1.25rem; gap: 1.25rem; max-width: 480px; width: 100%; margin: 0 auto; }

    /* ── Login ── */
    .login-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 1.25rem; padding: 2rem 1.25rem; }
    .login-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 2rem 1.5rem; width: 100%; max-width: 340px; display: flex; flex-direction: column; align-items: center; gap: 1.25rem; text-align: center; }
    .login-emoji { font-size: 2.5rem; }
    .login-title { font-family: 'IBM Plex Mono', monospace; font-size: 0.85rem; color: var(--green); letter-spacing: 0.15em; }
    .login-desc { font-size: 0.78rem; color: var(--muted); line-height: 1.7; }
    .btn-google { display: flex; align-items: center; gap: 0.75rem; background: #fff; color: #3c4043; border: none; border-radius: 4px; padding: 0.75rem 1.25rem; font-size: 0.85rem; font-weight: 600; cursor: pointer; width: 100%; justify-content: center; transition: box-shadow 0.15s; }
    .btn-google:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
    .btn-google img { width: 20px; height: 20px; }

    /* ── User bar ── */
    .user-bar { background: var(--surface); border: 1px solid var(--border); border-radius: 4px; padding: 0.6rem 1rem; display: flex; align-items: center; gap: 0.75rem; }
    .user-avatar { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--border); }
    .user-name { font-size: 0.82rem; color: var(--text); flex: 1; }
    .user-email { font-size: 0.62rem; color: var(--muted); font-family: 'IBM Plex Mono', monospace; }
    .btn-logout { background: transparent; border: 1px solid rgba(255,59,59,0.3); color: #ff8080; font-size: 0.65rem; padding: 0.35rem 0.7rem; border-radius: 3px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; }

    /* ── Scanner ── */
    .scanner-label { font-family: 'IBM Plex Mono', monospace; font-size: 0.65rem; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase; margin-bottom: 0.6rem; }
    .video-wrapper { position: relative; width: 100%; aspect-ratio: 1/1; background: #000; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    #preview { width: 100%; height: 100%; object-fit: cover; }
    .scan-overlay { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; pointer-events: none; }
    .scan-frame { width: 55%; aspect-ratio: 1; border: 2px solid var(--green); box-shadow: 0 0 0 9999px rgba(0,0,0,0.45); border-radius: 4px; }
    .scan-line { position: absolute; width: 55%; height: 2px; background: linear-gradient(90deg, transparent, var(--green), transparent); animation: scanline 2s ease-in-out infinite; }
    @keyframes scanline { 0% { top: 22.5%; opacity:0; } 10% { opacity:1; } 90% { opacity:1; } 100% { top:77.5%; opacity:0; } }
    .scanner-off-msg { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 0.5rem; background: #000; }
    .scanner-off-msg p { font-size: 0.75rem; color: var(--muted); }

    /* ── Buttons ── */
    .btn { width: 100%; padding: 0.85rem; border: none; border-radius: 3px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; letter-spacing: 0.1em; font-weight: 600; transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
    .btn-start { background: rgba(0,255,127,0.1); border: 1px solid rgba(0,255,127,0.4); color: var(--green); margin-top: 0.75rem; }
    .btn-confirm { background: var(--green); color: #0a0f0a; font-size: 0.9rem; }
    .btn-confirm:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-reset { background: transparent; border: 1px solid var(--border); color: var(--muted); margin-top: 0.5rem; }

    .manual-section { display: flex; gap: 0.5rem; }
    .manual-input { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 0.7rem 0.9rem; color: var(--text); font-family: 'IBM Plex Mono', monospace; font-size: 0.8rem; outline: none; }
    .manual-input:focus { border-color: rgba(0,255,127,0.5); }
    .manual-input::placeholder { color: var(--muted); }
    .btn-manual { padding: 0.7rem 1rem; width: auto; background: rgba(0,255,127,0.08); border: 1px solid var(--border); color: var(--green); border-radius: 3px; cursor: pointer; font-size: 0.8rem; font-family: 'IBM Plex Mono', monospace; }

    /* ── Result ── */
    .result-card { border-radius: 4px; overflow: hidden; display: none; animation: slideUp 0.4s cubic-bezier(0.16,1,0.3,1) both; }
    .result-card.show { display: block; }
    @keyframes slideUp { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
    .result-header { padding: 1.2rem 1.25rem 1rem; display: flex; align-items: center; gap: 1rem; }
    .result-icon { font-size: 2.5rem; }
    .result-header-text h2 { font-size: 1.1rem; font-weight: 700; }
    .result-header-text p { font-size: 0.7rem; margin-top: 2px; opacity: 0.6; font-family: 'IBM Plex Mono', monospace; }
    .result-card.valid .result-header { background: rgba(0,255,127,0.08); border-bottom: 1px solid rgba(0,255,127,0.2); }
    .result-card.valid .result-header-text h2 { color: var(--green); }
    .result-card.invalid .result-header { background: rgba(255,59,59,0.08); border-bottom: 1px solid rgba(255,59,59,0.2); }
    .result-card.invalid .result-header-text h2 { color: var(--red); }
    .result-body { padding: 1.1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-top: none; }
    .result-field { display: flex; justify-content: space-between; padding: 0.45rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .result-field:last-child { border-bottom: none; }
    .result-field-key { font-size: 0.65rem; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; font-family: 'IBM Plex Mono', monospace; }
    .result-field-val { font-size: 0.9rem; color: var(--text); text-align: right; max-width: 65%; word-break: break-all; }
    .result-actions { padding: 1rem 1.25rem; background: var(--surface); border: 1px solid var(--border); border-top: none; }

    .loading { display: none; text-align: center; padding: 1.5rem; gap: 0.5rem; flex-direction: column; align-items: center; }
    .loading.show { display: flex; }
    .spinner { width: 28px; height: 28px; border: 2px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading p { font-family: 'IBM Plex Mono', monospace; font-size: 0.7rem; color: var(--muted); }

    .toast { position: fixed; bottom: 1.5rem; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 0.7rem 1.2rem; font-size: 0.8rem; font-family: 'IBM Plex Mono', monospace; color: var(--green); transition: transform 0.35s cubic-bezier(0.16,1,0.3,1); z-index: 100; white-space: nowrap; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

<header>
  <div class="header-icon">✈</div>
  <div class="header-text">
    <h1>LOUNGE · REDEMPTION</h1>
    <p>Airport Lounge Access · Staff Terminal</p>
  </div>
  <div class="status-dot-wrap">
    <div class="status-dot"></div><span>ONLINE</span>
  </div>
</header>

<!-- ── 登入畫面 ── -->
<div class="login-wrap" id="loginScreen">
  <div class="login-box">
    <div class="login-emoji">✈️</div>
    <div class="login-title">STAFF LOGIN</div>
    <p class="login-desc">請輸入你的 Google 帳號<br>登入後才能使用核銷系統</p>

    <input type="email" id="loginEmail" placeholder="你的 Gmail 帳號"
      style="width:100%;background:#1a2a1a;border:1px solid var(--border);border-radius:3px;padding:0.7rem 0.9rem;color:var(--text);font-size:0.85rem;outline:none;font-family:'Noto Sans TC',sans-serif;">

    <button class="btn-google" onclick="loginWithEmail()">
      <svg width="20" height="20" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.35-8.16 2.35-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
      用 Google 帳號登入
    </button>

    <p style="font-size:0.68rem;color:var(--muted);line-height:1.6">
      ⚠️ 需使用有權限的 Google 帳號<br>才能存取核銷系統資料庫
    </p>
  </div>
</div>

<!-- ── 主畫面 ── -->
<main id="mainApp" style="display:none">

  <div class="user-bar">
    <img class="user-avatar" id="userAvatar" src="https://www.gstatic.com/images/branding/product/1x/avatar_circle_blue_512dp.png" alt="">
    <div style="flex:1">
      <div class="user-name" id="userName">工作人員</div>
      <div class="user-email" id="userEmail"></div>
    </div>
    <button class="btn-logout" onclick="logout()">登出</button>
  </div>

  <div>
    <div class="scanner-label">📷 QR Code 掃描器</div>
    <div class="video-wrapper">
      <video id="preview" playsinline></video>
      <div class="scan-overlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
      </div>
      <div class="scanner-off-msg" id="scannerOffMsg">
        <span style="font-size:2rem">📷</span>
        <p>按下「啟動相機」開始掃描</p>
      </div>
    </div>
    <button class="btn btn-start" id="btnStartScan">▶ 啟動相機掃描</button>
  </div>

  <div>
    <div class="scanner-label">⌨️ 手動輸入票券編號</div>
    <div class="manual-section">
      <input type="text" class="manual-input" id="manualInput" placeholder="PASS-001">
      <button class="btn-manual" id="btnManual">查詢</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <p>查詢資料庫中...</p>
  </div>

  <div class="result-card" id="resultCard">
    <div class="result-header">
      <div class="result-icon" id="resultIcon"></div>
      <div class="result-header-text">
        <h2 id="resultTitle"></h2>
        <p id="resultSubtitle"></p>
      </div>
    </div>
    <div class="result-body" id="resultBody"></div>
    <div class="result-actions" id="resultActions"></div>
  </div>

</main>

<div class="toast" id="toast"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwoCsWPb1sv_Vuan2vaHlKfuYZ84MOEd_oVyNAQTrWdcVciZyXzqWW-9dRnEwJsStL5sw/exec";

  let codeReader = null;
  let scanning = false;
  let lastScanned = "";
  let lastScannedTime = 0;
  const $ = id => document.getElementById(id);

  // ── 登入（簡單版：輸入 email 即可）──
  function loginWithEmail() {
    const email = $("loginEmail").value.trim();
    if (!email || !email.includes("@")) {
      showToast("⚠️ 請輸入正確的 Email");
      return;
    }
    $("userEmail").textContent = email;
    $("userName").textContent = email.split("@")[0];
    $("loginScreen").style.display = "none";
    $("mainApp").style.display = "flex";
    showToast("✅ 登入成功");
  }

  function logout() {
    $("loginScreen").style.display = "flex";
    $("mainApp").style.display = "none";
    $("loginEmail").value = "";
    resetUI();
  }

  // ── 掃描器 ──
  $("btnStartScan").addEventListener("click", async () => {
    if (scanning) { stopScanner(); return; }
    try {
      codeReader = new ZXing.BrowserQRCodeReader();
      const devices = await ZXing.BrowserQRCodeReader.listVideoInputDevices();
      const deviceId = devices.length > 1 ? devices[1].deviceId : devices[0]?.deviceId;
      $("scannerOffMsg").style.display = "none";
      $("btnStartScan").textContent = "⏹ 停止掃描";
      scanning = true;
      codeReader.decodeFromVideoDevice(deviceId, "preview", (result) => {
        if (result) {
          const text = result.getText();
          const now = Date.now();
          if (text === lastScanned && now - lastScannedTime < 3000) return;
          lastScanned = text; lastScannedTime = now;
          let passId = text;
          try { const url = new URL(text); passId = url.searchParams.get("id") || text; } catch {}
          stopScanner();
          verifyPass(passId);
        }
      });
    } catch (e) { alert("無法啟動相機：" + e.message); }
  });

  function stopScanner() {
    if (codeReader) { codeReader.reset(); codeReader = null; }
    scanning = false;
    $("btnStartScan").textContent = "▶ 啟動相機掃描";
    $("scannerOffMsg").style.display = "flex";
  }

  $("btnManual").addEventListener("click", () => {
    const id = $("manualInput").value.trim();
    if (id) verifyPass(id);
  });

  $("manualInput").addEventListener("keydown", e => { if (e.key === "Enter") $("btnManual").click(); });

  // ── API 呼叫 ──
  async function verifyPass(passId) {
    showLoading(true); clearResult();
    try {
      const res = await fetch(`${API_URL}?action=verify&id=${encodeURIComponent(passId)}`);
      const data = await res.json();
      showResult(data, passId);
    } catch (e) {
      showError("連線失敗，請稍後再試");
    } finally { showLoading(false); }
  }

  async function redeemPass(passId) {
    const btn = $("btnConfirmRedeem");
    btn.disabled = true; btn.textContent = "核銷中...";
    try {
      const res = await fetch(API_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ action: "redeem", id: passId })
      });
      const data = await res.json();
      if (data.success) { showToast("✅ 核銷成功！"); setTimeout(() => verifyPass(passId), 600); }
      else { showToast("❌ " + (data.error || "核銷失敗")); btn.disabled = false; btn.textContent = "✓ 確認核銷"; }
    } catch (e) { showToast("❌ 網路錯誤"); btn.disabled = false; btn.textContent = "✓ 確認核銷"; }
  }

  // ── UI ──
  function showResult(data, passId) {
    const card = $("resultCard");
    card.className = "result-card show";
    if (data.valid) {
      card.classList.add("valid");
      $("resultIcon").textContent = "🟢";
      $("resultTitle").textContent = "票券有效";
      $("resultSubtitle").textContent = "PASS · VALID";
      $("resultBody").innerHTML = `
        <div class="result-field"><span class="result-field-key">旅客姓名</span><span class="result-field-val">${data.guestName}</span></div>
        <div class="result-field"><span class="result-field-key">合作廠商</span><span class="result-field-val">${data.partnerName}</span></div>
        <div class="result-field"><span class="result-field-key">票券編號</span><span class="result-field-val">${data.passId}</span></div>
        <div class="result-field"><span class="result-field-key">狀態</span><span class="result-field-val" style="color:var(--green)">● 待核銷</span></div>`;
      $("resultActions").innerHTML = `
        <button class="btn btn-confirm" id="btnConfirmRedeem" onclick="redeemPass('${data.passId}')">✓ 確認核銷</button>
        <button class="btn btn-reset" onclick="resetUI()">取消</button>`;
    } else {
      card.classList.add("invalid");
      $("resultIcon").textContent = "🔴";
      $("resultTitle").textContent = data.reason || "票券無效";
      $("resultSubtitle").textContent = "PASS · REJECTED";
      let html = `<div class="result-field"><span class="result-field-key">票券編號</span><span class="result-field-val">${passId}</span></div>`;
      if (data.guestName) html += `
        <div class="result-field"><span class="result-field-key">旅客姓名</span><span class="result-field-val">${data.guestName}</span></div>
        <div class="result-field"><span class="result-field-key">核銷時間</span><span class="result-field-val" style="color:var(--red)">${data.redeemedAt}</span></div>`;
      $("resultBody").innerHTML = html;
      $("resultActions").innerHTML = `<button class="btn btn-reset" onclick="resetUI()">↩ 重新掃描</button>`;
    }
  }

  function showError(msg) {
    const card = $("resultCard");
    card.className = "result-card show invalid";
    $("resultIcon").textContent = "⚠️";
    $("resultTitle").textContent = "連線錯誤";
    $("resultSubtitle").textContent = "ERROR";
    $("resultBody").innerHTML = `<p style="color:var(--red);font-size:0.85rem;padding:0.5rem 0">${msg}</p>`;
    $("resultActions").innerHTML = `<button class="btn btn-reset" onclick="resetUI()">↩ 重試</button>`;
  }

  function clearResult() { $("resultCard").className = "result-card"; }
  function resetUI() { clearResult(); $("manualInput").value = ""; }
  function showLoading(v) { $("loading").className = v ? "loading show" : "loading"; }
  function showToast(msg) {
    const t = $("toast"); t.textContent = msg; t.classList.add("show");
    setTimeout(() => t.classList.remove("show"), 2800);
  }
</script>
</body>
</html>
